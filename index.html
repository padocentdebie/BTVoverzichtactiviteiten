<div class="filter-bar">
    <button onclick="filterLessen('all')">Alles</button>
    <button onclick="filterLessen('Theorie')" style="border-left: 4px solid #3182ce;">Theorie</button>
    <button onclick="filterLessen('Oefening')" style="border-left: 4px solid #27ae60;">Oefeningen</button>
    <button onclick="filterLessen('Project')" style="border-left: 4px solid #f1c40f;">Projecten</button>
</div>

<style>
    .filter-bar { margin-bottom: 20px; display: flex; gap: 10px; }
    .filter-bar button { 
        background: white; border: 1px solid #ddd; padding: 8px 15px; 
        cursor: pointer; border-radius: 4px; transition: 0.3s;
    }
    .filter-bar button:hover { background: #f0f0f0; }
    
    /* Werkvorm-specifieke stijlen */
    .row-theorie { border-left: 5px solid #3182ce; }
    .row-oefening { border-left: 5px solid #27ae60; }
    .row-project { border-left: 5px solid #f1c40f; }
</style>

<script type="module">
  // ... (bestaande Firebase import)

  // Aangepaste render functie met sortering
  function renderTable(data) {
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = "";

    // Zet object om naar array en sorteer op volgorde (indien aanwezig)
    const sortedLessons = Object.values(data).sort((a, b) => (a.volgorde || 0) - (b.volgorde || 0));

    sortedLessons.forEach(lesson => {
      const row = document.createElement('tr');
      row.className = `row-${lesson.type.toLowerCase()}`; // Automatische kleur per type
      row.innerHTML = `
        <td><strong>${lesson.volgorde || '-'}</strong></td>
        <td><strong>${lesson.title}</strong></td>
        <td><span class="tag">${lesson.type}</span></td>
        <td>${lesson.inhoud}</td>
        <td><button onclick="viewCode(...)">Code</button></td>
      `;
      tableBody.appendChild(row);
    });
  }

  // Filter functie
  window.filterLessen = (type) => {
    const rows = document.querySelectorAll('#tableBody tr');
    rows.forEach(row => {
      if (type === 'all' || row.classList.contains(`row-${type.toLowerCase()}`)) {
        row.style.display = "";
      } else {
        row.style.display = "none";
      }
    });
  }
</script>
